# DynamoDB Local for backend/health development (T030).
# Usage: docker compose -f apps/backend/docker-compose.yml up -d
services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: workboard-dynamodb-local
    command: '-jar DynamoDBLocal.jar -sharedDb -inMemory'
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:8000 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
