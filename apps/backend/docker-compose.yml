# Local backing services for fully-local development (no AWS account required).
# Started automatically by `npm run local`; also usable directly:
#   docker compose -f apps/backend/docker-compose.yml up -d
services:
  # DynamoDB Local — holds the account-profile item locally (T030).
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: workboard-dynamodb-local
    command: '-jar DynamoDBLocal.jar -sharedDb -inMemory'
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:8000 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # Cognito Local — a no-AWS emulator of the Cognito user pool so sign-up / verify /
  # login and backend token verification all work fully offline. Note: it supports only
  # USER_PASSWORD_AUTH (no SRP) and cannot send email — the verification code is fixed to
  # CODE below and also printed to this container's logs.
  cognito-local:
    image: jagregory/cognito-local:latest
    container_name: workboard-cognito-local
    ports:
      - '9229:9229'
    environment:
      # Deterministic verification code for local sign-up (documented in README).
      - CODE=123456
    volumes:
      # Persists the seeded pool/client + users across restarts.
      - ./.cognito:/app/.cognito

  # LocalStack (S3 only) — a no-AWS emulator of the notes body bucket so note-body
  # PutObject/GetObject/DeleteObject work fully offline, mirroring the DynamoDB Local +
  # cognito-local story. The local notes bucket is created on startup by
  # tools/scripts/bootstrap-s3.mjs (invoked from `npm run local` / the e2e local stack).
  # Runs with `-inMemory`-equivalent ephemeral storage — the bucket is recreated each start.
  localstack:
    image: localstack/localstack:latest
    container_name: workboard-localstack
    ports:
      - '4566:4566'
    environment:
      # Only S3 is needed; keep the emulator lean.
      - SERVICES=s3
      - DEBUG=0
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:4566/_localstack/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
